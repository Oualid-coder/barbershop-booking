name: Cleanup old bookings

on:
  schedule:
    - cron: '0 2 1 * *'   # 1er de chaque mois à 02:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete bookings older than 12 months
        env:
          SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DATE_CUTOFF=$(date -u -d '12 months ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Cutoff : ${DATE_CUTOFF}"

          HEADERS=$(curl -sf -D - -o /dev/null \
            -X DELETE \
            "https://mdynhezcfkhysrwxduqe.supabase.co/rest/v1/bookings?created_at=lt.${DATE_CUTOFF}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Prefer: count=exact")

          HTTP_CODE=$(echo "$HEADERS" | grep -i "^HTTP/" | awk '{print $2}')
          COUNT=$(echo "$HEADERS"     | grep -i "^content-range:" | grep -oE '[0-9]+$')

          echo "HTTP status          : ${HTTP_CODE}"
          echo "Réservations supprimées : ${COUNT:-0}"

          if [ "${HTTP_CODE}" != "204" ]; then
            echo "Erreur inattendue (HTTP ${HTTP_CODE})"
            exit 1
          fi
