name: Keep Supabase alive

on:
  schedule:
    - cron: '0 8 * * 1,4,0'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://mdynhezcfkhysrwxduqe.supabase.co/rest/v1/services?select=id&limit=1"
